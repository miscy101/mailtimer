<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mailtimer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

<div id="app">

  <!-- ═══ SETUP SCREEN ═══════════════════════════════════════════════════ -->
  <div id="screen-setup" class="screen active">
    <div class="layout">

      <!-- LEFT: settings groups -->
      <div class="col-left">

        <!-- Timer length -->
        <section class="group">
          <div class="group-header">
            <span class="group-title">Timer length</span>
            <label class="toggle-row">
              <span class="toggle-label">Random</span>
              <input type="checkbox" id="toggle-random" />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </label>
          </div>
          <div id="timer-fixed" class="timer-input-row">
            <label for="input-seconds">Seconds</label>
            <input type="number" id="input-seconds" min="1" max="86400" value="600" />
          </div>
          <div id="timer-random" class="timer-input-row hidden">
            <label for="input-min">Min</label>
            <input type="number" id="input-min" min="1" max="86400" value="60" />
            <label for="input-max">Max</label>
            <input type="number" id="input-max" min="1" max="86400" value="600" />
          </div>
        </section>

        <!-- Modifiers -->
        <section class="group">
          <div class="group-header">
            <span class="group-title">Modifiers</span>
          </div>
          <label class="option-row">
            <input type="checkbox" id="toggle-tardis" />
            <span><span class="option-name">TARDIS</span><span class="option-desc"> — Wibbly wobbly... timey... wimey...?</span></span>
          </label>
          <label class="option-row">
            <input type="checkbox" id="toggle-spin" />
            <span><span class="option-name">Spin the wheel</span><span class="option-desc"> — When the timer reaches zero, it might send... or it might not.</span></span>
          </label>
          <label class="option-row">
            <input type="checkbox" id="toggle-lastminute" />
            <span><span class="option-name">Last minute</span><span class="option-desc"> — You can't back out until the very last minute.</span></span>
          </label>
        </section>

        <!-- Chaos -->
        <section class="group chaos-group">
          <div class="group-header">
            <span class="group-title">Chaos</span>
          </div>
          <label class="option-row">
            <input type="checkbox" id="toggle-roulette" />
            <span><span class="option-name">Roulette</span><span class="option-desc"> — Hitting Start gets a bit more dangerous</span></span>
          </label>
          <label class="option-row">
            <input type="checkbox" id="toggle-brokenui" />
            <span><span class="option-name">Unstable UI</span><span class="option-desc"> — Compiler error detected</span></span>
          </label>
          <label class="option-row">
            <input type="checkbox" id="toggle-rosetta" />
            <span><span class="option-name">Babel</span><span class="option-desc"> — ...there confound their language, that they may not understand...</span></span>
          </label>
          <label class="option-row">
            <input type="checkbox" id="toggle-commitment" />
            <span><span class="option-name">Commitment issues</span><span class="option-desc"> — You'll find you've followed through, guaranteed.</span></span>
          </label>
        </section>

        <!-- Metadata options -->
        <section class="group">
          <div class="group-header">
            <span class="group-title">Prove you're playing?</span>
          </div>
          <label class="option-row">
            <input type="radio" name="metadata-mode" id="meta-none" value="none" />
            <span><span class="option-name">Nothing</span><span class="option-desc"> — I'm just risking it for fun</span></span>
          </label>
          <label class="option-row">
            <input type="radio" name="metadata-mode" id="meta-log" value="log" checked />
            <span><span class="option-name">Game data log</span><span class="option-desc"> — I want to show I'm playing by the rules</span></span>
          </label>
          <label class="option-row">
            <input type="radio" name="metadata-mode" id="meta-extra" value="extra" />
            <span><span class="option-name">A little risky extra</span><span class="option-desc"> — If you're feeling brave</span></span>
          </label>
        </section>

      </div><!-- /col-left -->

      <!-- RIGHT: controls -->
      <div class="col-right">
        <div class="timer-display" id="display-setup">--:--</div>

        <div class="blindfold-block">
          <label class="option-row">
            <input type="checkbox" id="toggle-blindfold" />
            <span><span class="option-name">Blindfold</span><span class="option-desc"> — Hides the countdown.</span></span>
          </label>
          <div id="peek-limit-block" class="peek-limit-row hidden">
            <label class="option-row">
              <input type="checkbox" id="toggle-peek-limit" />
              <span><span class="option-name">Limit my peeks to:</span><span class="option-desc"> — Run out and you're flying blind for good.</span></span>
            </label>
            <div id="peek-limit-input-row" class="timer-input-row hidden">
              <input type="number" id="input-peek-limit" min="1" max="99" value="3" />
              <span class="option-desc">peeks</span>
            </div>
          </div>
        </div>

        <div class="consent-block">
          <label class="option-row">
            <input type="checkbox" id="consent-checkbox" />
            <span><span class="option-name" style="color:#c03030;">Consent</span><span id="consent-text" class="option-desc"> — I understand this will send an email on my behalf. I consent to the recipient receiving and using this information at their discretion.</span></span>
          </label>
        </div>

        <div class="controls-stack">
          <div id="warn-no-to" class="field-warning hidden">No recipient in the To field. Add one before starting.</div>
          <button id="btn-start" class="btn btn-primary" disabled>Start</button>
        </div>
      </div>

    </div>
  </div><!-- /screen-setup -->


  <!-- ═══ RUNNING SCREEN ══════════════════════════════════════════════════ -->
  <div id="screen-running" class="screen">
    <div class="layout">

      <div class="col-left running-info">
        <div class="run-label" id="run-mode-label"></div>
        <div class="run-flags" id="run-flags"></div>
      </div>

      <div class="col-right">
        <div class="timer-display large" id="display-running">10:00</div>
        <div class="speed-indicator" id="speed-indicator"></div>

        <div class="controls-stack">
          <button id="btn-pause"    class="btn">Pause</button>
          <button id="btn-cancel"   class="btn">Cancel</button>
          <button id="btn-send-now-live" class="btn hidden">Send now</button>
          <button id="btn-peek"     class="btn hidden">Take a peek</button>
          <p id="peek-exhausted-msg" class="option-desc hidden" style="text-align:center;color:#c03030;">No peeks remaining.</p>
          <button id="btn-blindfold-live" class="btn hidden">Blindfold</button>
          <button id="btn-roulette-live"  class="btn hidden">Roulette</button>
          <p id="roulette-live-desc" class="option-desc roulette-desc hidden">(A chance it'll send now.)</p>
        </div>
      </div>

    </div>
  </div>


  <!-- ═══ OUTCOME SCREEN ══════════════════════════════════════════════════ -->
  <div id="screen-outcome" class="screen">
    <div class="outcome-content">
      <div class="outcome-icon" id="outcome-icon"></div>
      <div class="outcome-title" id="outcome-title"></div>
      <div class="outcome-detail" id="outcome-detail"></div>
      <button id="btn-reset" class="btn btn-primary" style="margin-top:1.5rem">Close</button>
    </div>
  </div>

</div>

<script type="module" src="popup.js"></script>
</body>
</html>
